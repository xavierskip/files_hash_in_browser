<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>files hash in browser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><g transform='rotate(10, 16, 16)'><rect x='3' y='4' width='22' height='22' fill='%23FDF6E3' stroke='%231A1A2E' stroke-width='2'/><rect x='7' y='7' width='22' height='22' fill='%231A1A2E'/><text x='14' y='21' font-size='15' font-family='Arial' font-weight='bold' text-anchor='middle' fill='%23FDF6E3'>%23</text></g></svg>">
    <link rel="apple-touch-icon" href="icon-128x128.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FDF6E3">
</head>
<body>
    <div class="controls">
        <label for="hash-algo" data-i18n="algo_label">Hash算法:</label>
        <select id="hash-algo">
            <option value="SHA-1">SHA-1</option>
            <option value="SHA-256">SHA-256</option>
            <option value="SHA-384">SHA-384</option>
            <option value="SHA-512">SHA-512</option>
        </select>
        <span class="display-mode-hint" data-i18n="display_hint">(点击哈希值切换格式，右键复制)</span>
    </div>
    <div id="drop_zone" class="dropzone">
            <p id="drop-hint" data-i18n="hint_default">将单个或多个文件拖拽到该区域</p>
            <table id="files_table">
                <thead class="noneDisplay">
                    <tr>
                      <th id="hash-header" class="hashThWidth">SHA-1</th>
                      <th class="sizeThWidth" data-i18n="size_header">SIZE</th>
                      <th class="nameThWidth" data-i18n="name_header">NAME</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
            <div class="noneDisplay loader">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
    </div>
    <div class="file-input-container">
        <input type="file" id="file-input" multiple class="noneDisplay">
        <button id="select-file-btn" class="select-file-btn" data-i18n="select_file">选择文件</button>
    </div>
    <div class="footer">
        <a href="wasm.html" class="footer-link" data-i18n="test_page">Hash-WASM 测试</a>
        <a class="github-link" href="https://github.com/xavierskip/files_hash_in_browser" target="_blank" rel="noopener">
            <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
            </svg>
            GitHub
        </a>
        <span class="footer-link" id="lang-switcher" data-i18n="language">🌐 Language</span>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/hash-wasm@4/dist/sha1.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hash-wasm@4/dist/sha256.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hash-wasm@4/dist/sha384.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hash-wasm@4/dist/sha512.umd.min.js"></script>
    <script src="i18n.js"></script>
    <script src="main.js"></script>
    <script>
        // 注册 Service Worker 以实现离线访问
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('service-worker.js')
                    .then(function(registration) {
                        console.log('ServiceWorker sucess: ', registration.scope);
                    })
                    .catch(function(error) {
                        console.log('ServiceWorker fail: ', error);
                    });
            });
        }
    </script>
</body>
</html>
